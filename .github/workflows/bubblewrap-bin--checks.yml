name: "[bubblewrap-bin] Checks"

on:
  pull_request:
    branches: [main]
    paths:
      - "bubblewrap-bin/**"
      - ".github/workflows/bubblewrap-bin--checks.yml"
  push:
    branches: [main]
    paths:
      - "bubblewrap-bin/**"
      - ".github/workflows/bubblewrap-bin--checks.yml"
  workflow_call:

env:
  PYTHON_VERSION: "3.12"

permissions:
  contents: read

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: depot-ubuntu-latest
    defaults:
      run:
        working-directory: bubblewrap-bin

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install dev dependencies
        run: uv pip install --system pytest

      - name: Run unit tests
        run: pytest -v
