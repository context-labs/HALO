name: "[bubblewrap-bin] Release"

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (build only; skip commit, push, and PyPI publish)"
        required: true
        default: true
        type: boolean

concurrency:
  group: bubblewrap-bin-release-${{ github.ref_name }}
  cancel-in-progress: false

env:
  PYTHON_VERSION: "3.12"
  # Upstream bwrap version is stored in bubblewrap-bin/VENDORED_BWRAP_VERSION
  # (single source of truth read by both the build script and the bump step).
  # The SHA stays here because it is paired with the version pin and only
  # needs to change when VENDORED_BWRAP_VERSION changes.
  BWRAP_SHA256: "988fd6b232dafa04b8b8198723efeaccdb3c6aa9c1c7936219d5791a8b7a8646"
  CI_BOT_GITHUB_APP_ID: "1281730"

  INFISICAL_IDENTITY_ID: "dc1d9282-7640-471d-bc3e-926297a5ef85" # halo-github-ci

permissions:
  contents: write # tag-and-push pushes the version commit + tag
  id-token: write # Required for OIDC-based Infisical auth and PyPI trusted publishing

jobs:
  checks:
    name: Checks
    uses: ./.github/workflows/bubblewrap-bin--checks.yml
    secrets: inherit

  bump-version:
    name: Bump Version
    needs: [checks]
    runs-on: depot-ubuntu-latest
    outputs:
      new_version: ${{ steps.bump.outputs.new_version }}
    defaults:
      run:
        working-directory: bubblewrap-bin
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Compute next version
        # Versioning scheme (per README):
        #   - Package version tracks the upstream bwrap version verbatim.
        #   - Repackaging the same upstream (e.g. fixing a packaging bug)
        #     bumps a PEP 440 ``.postN`` suffix on the same upstream version.
        # Effect: 0.11.0 -> 0.11.0.post1 -> 0.11.0.post2 -> (bump upstream)
        # -> 0.12.0 -> 0.12.0.post1 -> ...
        id: bump
        run: |
          UPSTREAM_VERSION=$(cat VENDORED_BWRAP_VERSION)
          CURRENT_VERSION=$(uv version --short --no-sync)
          CURRENT_RELEASE="${CURRENT_VERSION%.post*}"

          if [ "$CURRENT_RELEASE" != "$UPSTREAM_VERSION" ]; then
            NEW_VERSION="$UPSTREAM_VERSION"
          elif [[ "$CURRENT_VERSION" == *.post* ]]; then
            POST_N="${CURRENT_VERSION##*.post}"
            NEW_VERSION="${UPSTREAM_VERSION}.post$((POST_N + 1))"
          else
            NEW_VERSION="${UPSTREAM_VERSION}.post1"
          fi

          uv version --no-sync "$NEW_VERSION"
          echo "Bumped bubblewrap-bin: ${CURRENT_VERSION} -> ${NEW_VERSION} (upstream bwrap ${UPSTREAM_VERSION})"
          echo "new_version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Upload bumped manifest
        uses: actions/upload-artifact@v4
        with:
          name: bubblewrap-bin-release-manifests
          path: |
            bubblewrap-bin/pyproject.toml
          retention-days: 1

  build-linux-wheel:
    name: Build Linux Wheel (${{ matrix.arch }})
    needs: [bump-version]
    runs-on: ${{ matrix.runner }}
    # Build inside the official PyPA manylinux_2_28 container so the bwrap
    # binary links against glibc 2.28, which is what auditwheel needs to
    # accept it as a manylinux_2_28 wheel. Building on the host runner
    # picks up newer glibc symbols and auditwheel rejects them.
    container:
      image: ${{ matrix.container_image }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: depot-ubuntu-latest
            container_image: quay.io/pypa/manylinux_2_28_x86_64
            wheel_platform: manylinux_2_28_x86_64
          - arch: aarch64
            runner: depot-ubuntu-latest-arm
            container_image: quay.io/pypa/manylinux_2_28_aarch64
            wheel_platform: manylinux_2_28_aarch64
    defaults:
      run:
        working-directory: bubblewrap-bin

    steps:
      - uses: actions/checkout@v4

      - name: Download bumped manifest
        uses: actions/download-artifact@v4
        with:
          name: bubblewrap-bin-release-manifests
          path: bubblewrap-bin/

      - name: Install C build dependencies
        # manylinux_2_28 is AlmaLinux 8-based; libcap headers come from
        # libcap-devel via dnf. xz/curl/tar/gcc/make are already in the image.
        run: dnf install --assumeyes libcap-devel xz

      - name: Install Python build tooling
        # The manylinux image ships multiple CPython interpreters under
        # /opt/python; pick 3.12 to match the project's requires-python.
        # auditwheel is preinstalled in the image; meson/ninja/uv are not.
        run: |
          /opt/python/cp312-cp312/bin/python -m pip install --upgrade meson ninja uv
          echo "/opt/python/cp312-cp312/bin" >> "$GITHUB_PATH"

      - name: Build vendored bwrap
        env:
          ARCH: ${{ matrix.arch }}
          BWRAP_SHA256: ${{ env.BWRAP_SHA256 }}
        run: ./scripts/build_bwrap.sh

      - name: Build wheel
        run: |
          uv build --wheel --out-dir dist
          # hatchling produces a generic ``py3-none-any`` wheel (no native
          # Python code, just a vendored binary). auditwheel inspects the
          # bwrap binary's ELF symbols and produces a properly-tagged
          # manylinux wheel.
          for whl in dist/*.whl; do
              auditwheel repair "$whl" --wheel-dir dist/repaired --plat "${{ matrix.wheel_platform }}"
          done
          rm dist/*.whl
          mv dist/repaired/*.whl dist/
          rmdir dist/repaired

      - name: Smoke test wheel
        run: |
          /opt/python/cp312-cp312/bin/python -m venv .venv-smoke
          .venv-smoke/bin/pip install dist/*.whl
          .venv-smoke/bin/python -c "
          import subprocess
          from bubblewrap_bin import bwrap_path
          path = bwrap_path()
          print(f'packaged bwrap at: {path}')
          subprocess.run([str(path), '--version'], check=True)
          "

      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: bubblewrap-bin-wheel-${{ matrix.arch }}
          path: bubblewrap-bin/dist/*.whl
          retention-days: 14

  build-sdist:
    name: Build sdist
    needs: [bump-version]
    runs-on: depot-ubuntu-latest
    defaults:
      run:
        working-directory: bubblewrap-bin

    steps:
      - uses: actions/checkout@v4

      - name: Download bumped manifest
        uses: actions/download-artifact@v4
        with:
          name: bubblewrap-bin-release-manifests
          path: bubblewrap-bin/

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Build sdist
        run: uv build --sdist --out-dir dist

      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: bubblewrap-bin-sdist
          path: bubblewrap-bin/dist/*.tar.gz
          retention-days: 14

  publish:
    name: Publish to PyPI
    needs: [bump-version, build-linux-wheel, build-sdist]
    if: ${{ inputs.dry_run == false }}
    runs-on: depot-ubuntu-latest
    permissions:
      contents: read
      id-token: write
    environment:
      name: pypi-bubblewrap-bin
      url: https://pypi.org/project/bubblewrap-bin/${{ needs.bump-version.outputs.new_version }}/
    defaults:
      run:
        working-directory: bubblewrap-bin
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Download all distributions
        uses: actions/download-artifact@v4
        with:
          path: bubblewrap-bin/dist
          pattern: bubblewrap-bin-*
          merge-multiple: true

      - name: Publish to PyPI
        run: uv publish --trusted-publishing always

  tag-and-push:
    name: Tag & Push Version Bump
    needs: [bump-version, publish]
    if: ${{ inputs.dry_run == false }}
    runs-on: depot-ubuntu-latest
    permissions:
      contents: write
      id-token: write # Required for OIDC-based Infisical auth
    defaults:
      run:
        working-directory: bubblewrap-bin
    steps:
      - name: Load Infisical secrets
        uses: Infisical/secrets-action@v1.0.15
        with:
          method: "oidc"
          identity-id: ${{ env.INFISICAL_IDENTITY_ID }}
          project-slug: "halo-0ys-z"
          env-slug: "dev"
          secret-path: "/ci"
          include-imports: true

      - name: Mint CI Bot token
        uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ env.CI_BOT_GITHUB_APP_ID }}
          private-key: ${{ env.CI_BOT_GITHUB_APP_PRIVATE_KEY }}

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Download bumped manifest
        uses: actions/download-artifact@v4
        with:
          name: bubblewrap-bin-release-manifests
          path: bubblewrap-bin/

      - name: Commit, tag, and push version bump
        env:
          NEW_VERSION: ${{ needs.bump-version.outputs.new_version }}
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add pyproject.toml
          git commit -m "Release bubblewrap-bin v${NEW_VERSION}"
          git tag "bubblewrap-bin-v${NEW_VERSION}"
          git push origin "HEAD:${GITHUB_REF_NAME}"
          git push origin "bubblewrap-bin-v${NEW_VERSION}"

  summary:
    name: Release Summary
    needs:
      [
        checks,
        bump-version,
        build-linux-wheel,
        build-sdist,
        publish,
        tag-and-push,
      ]
    if: always()
    runs-on: depot-ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate summary
        env:
          DRY_RUN: ${{ inputs.dry_run }}
          NEW_VERSION: ${{ needs.bump-version.outputs.new_version }}
          CHECKS_RESULT: ${{ needs.checks.result }}
          BUMP_RESULT: ${{ needs.bump-version.result }}
          BUILD_LINUX_RESULT: ${{ needs.build-linux-wheel.result }}
          BUILD_SDIST_RESULT: ${{ needs.build-sdist.result }}
          PUBLISH_RESULT: ${{ needs.publish.result }}
          TAG_PUSH_RESULT: ${{ needs.tag-and-push.result }}
        run: |
          UPSTREAM_VERSION=$(cat bubblewrap-bin/VENDORED_BWRAP_VERSION)
          {
            echo "## bubblewrap-bin Release Summary"
            echo ""
            echo "**Bundled bwrap:**     ${UPSTREAM_VERSION}"
            echo "**New version:**       ${NEW_VERSION:-unknown}"
            echo "**Dry run:**           ${DRY_RUN}"
            echo ""
            echo "**Checks:**            ${CHECKS_RESULT}"
            echo "**Version Bump:**      ${BUMP_RESULT}"
            echo "**Linux Wheel Build:** ${BUILD_LINUX_RESULT}"
            echo "**Sdist Build:**       ${BUILD_SDIST_RESULT}"
            echo "**Publish:**           ${PUBLISH_RESULT}"
            echo "**Tag & Push:**        ${TAG_PUSH_RESULT}"
          } >> "$GITHUB_STEP_SUMMARY"
