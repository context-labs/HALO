name: "[Engine] Integration Tests"

on:
  pull_request:
    branches: [main]
    paths:
      - "engine/**"
      - ".github/workflows/engine--integration-tests.yml"
  push:
    branches: [main]
    paths:
      - "engine/**"
      - ".github/workflows/engine--integration-tests.yml"
  workflow_dispatch:
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  PYTHON_VERSION: "3.12"

permissions:
  checks: write
  contents: read

jobs:
  integration-tests:
    name: Integration Tests
    runs-on: depot-ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: engine

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "engine/uv.lock"

      - name: Install go-task
        uses: arduino/setup-task@v2
        with:
          version: 3.x

      - name: Install engine dependencies
        run: task ci:setup

      - name: Run integration tests (excludes ``-m live``)
        run: task test:integration

      - name: Publish Test Report
        uses: mikepenz/action-junit-report@v5
        if: always()
        with:
          report_paths: "engine/test-results/integration.xml"
          update_check: true
          detailed_summary: true
          include_passed: true
          include_time_in_summary: true
          fail_on_failure: true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: engine-integration-test-results
          path: engine/test-results/
          retention-days: 14

  linux-sandbox-tests:
    name: Linux Sandbox Tests
    runs-on: depot-ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: engine

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "engine/uv.lock"

      - name: Install go-task
        uses: arduino/setup-task@v2
        with:
          version: 3.x

      - name: Install engine dependencies
        run: task ci:setup

      - name: Allow unprivileged user namespaces
        # Ubuntu 24.04+ ships with kernel.apparmor_restrict_unprivileged_userns=1,
        # which AppArmor uses to deny several operations to unconfined processes
        # inside an unprivileged user namespace (capability-bound netlink ops
        # like loopback RTM_NEWADDR, uid_map writes, etc.). Both bwrap's own
        # network setup and util-linux unshare(1) trip this. CI is the
        # canonical "trusted" environment, so relax the restriction here; we
        # still get full namespace isolation, AppArmor just stops second-
        # guessing it. End users who hit this on Ubuntu 24.04+ get the same
        # remediation in the LinuxClient.resolve() warning.
        run: |
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0 || true

      - name: Run Linux sandbox integration tests with packaged bubblewrap
        run: |
          mkdir -p test-results .cache/pytest-integration-linux-packaged
          PATH="$PWD/.venv/bin" .venv/bin/python -m pytest tests/integration-linux \
            -o "cache_dir=.cache/pytest-integration-linux-packaged" \
            --junitxml=test-results/integration-linux-packaged.xml \
            -vv -s -rA

      - name: Install system bubblewrap
        run: |
          sudo apt-get update --quiet
          sudo apt-get install --yes --no-install-recommends bubblewrap

      - name: Run Linux sandbox integration tests with system bubblewrap
        run: |
          mkdir -p test-results .cache/pytest-integration-linux-system
          .venv/bin/python -m pytest tests/integration-linux \
            -o "cache_dir=.cache/pytest-integration-linux-system" \
            --junitxml=test-results/integration-linux-system.xml \
            -vv -s -rA

      - name: Publish Test Report
        uses: mikepenz/action-junit-report@v5
        if: always()
        with:
          report_paths: "engine/test-results/integration-linux*.xml"
          update_check: true
          detailed_summary: true
          include_passed: true
          include_time_in_summary: true
          fail_on_failure: true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: engine-linux-sandbox-results
          path: engine/test-results/
          retention-days: 14

  macos-sandbox-tests:
    name: macOS Sandbox Tests
    runs-on: depot-macos-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: engine

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "engine/uv.lock"

      - name: Install go-task
        uses: arduino/setup-task@v2
        with:
          version: 3.x

      - name: Install engine dependencies
        run: task ci:setup

      - name: Run macOS sandbox integration tests
        run: task test:integration-macos

      - name: Publish Test Report
        uses: mikepenz/action-junit-report@v5
        if: always()
        with:
          report_paths: "engine/test-results/integration-macos.xml"
          update_check: true
          detailed_summary: true
          include_passed: true
          include_time_in_summary: true
          fail_on_failure: true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: engine-macos-sandbox-results
          path: engine/test-results/
          retention-days: 14
