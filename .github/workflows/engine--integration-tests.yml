name: "[Engine] Integration Tests"

on:
  pull_request:
    branches: [main]
    paths:
      - "engine/**"
      - ".github/workflows/engine--integration-tests.yml"
  push:
    branches: [main]
    paths:
      - "engine/**"
      - ".github/workflows/engine--integration-tests.yml"
  workflow_dispatch:
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  PYTHON_VERSION: "3.12"

permissions:
  checks: write
  contents: read

jobs:
  integration-tests:
    name: Integration Tests
    runs-on: depot-ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: engine

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "engine/uv.lock"

      - name: Install go-task
        uses: arduino/setup-task@v2
        with:
          version: 3.x

      - name: Install engine dependencies
        run: task ci:setup

      - name: Run integration tests (excludes ``-m live``)
        run: task test:integration

      - name: Publish Test Report
        uses: mikepenz/action-junit-report@v5
        if: always()
        with:
          report_paths: "engine/test-results/integration.xml"
          update_check: true
          detailed_summary: true
          include_passed: true
          include_time_in_summary: true
          fail_on_failure: true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: engine-integration-test-results
          path: engine/test-results/
          retention-days: 14

  sandbox-tests:
    name: Sandbox Tests
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [depot-ubuntu-latest, depot-macos-latest]
    timeout-minutes: 15
    defaults:
      run:
        working-directory: engine

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "engine/uv.lock"

      - name: Install go-task
        uses: arduino/setup-task@v2
        with:
          version: 3.x

      - name: Install engine dependencies
        # The ``deno`` PyPI dependency ships the Deno binary, so no
        # separate setup-deno step is needed.
        run: task ci:setup

      - name: Run sandbox integration tests
        run: task test:integration-sandbox

      - name: Publish Test Report
        uses: mikepenz/action-junit-report@v5
        if: always()
        with:
          report_paths: "engine/test-results/integration-sandbox.xml"
          update_check: true
          detailed_summary: true
          include_passed: true
          include_time_in_summary: true
          fail_on_failure: true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: engine-sandbox-test-results-${{ matrix.os }}
          path: engine/test-results/
          retention-days: 14
